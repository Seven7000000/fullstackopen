name: Periodic health check

on:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  health_check:
    runs-on: ubuntu-20.04
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v3
        with:
          url: https://your-app.fly.dev
          max-attempts: 3
          retry-delay: 5s
